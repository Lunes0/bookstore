name: PR Workflow
on: [pull_request]
jobs:
  qa:
  name: Quality check
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.14.3
      uses: actions/setup-python@v5
      with:
        python-version: 3.14.3

    - name: Install Poetry
      run: |
        python -m pip install --upgrade pip
        pip install poetry==2.3.2
        poetry install
      env:
        POETRY_VIRTUALENVS_CREATE: false
    - name: View poetry --help
      run: poetry --help
    - name: Install dependencies
      shell: bash
      run: python -m poetry install

    - name: Run tests
      env:
        SECRET_KEY: "test_key"
        DEBUG: 1
        DJANGO_ALLOWED_HOSTS: "localhost 127.0.0.1"
        SQL_ENGINE: "django.db.backends.sqlite3"
        SQL_DATABASE: "db.sqlite3"
      run: python -m poetry run python manage.py test
    - name: Wamake Python Styleguide
      uses: wemake-services/wemake-python-styleguide
      continued-on-error: true
      with:
        reporter: "github-pr-review"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
